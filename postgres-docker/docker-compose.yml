services:
  postgres:
    image: postgres:16
    container_name: incahoots3d-postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: rupertbear
      POSTGRES_USER: postgres
      POSTGRES_DB: incahoots3d
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
